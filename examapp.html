<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamApp</title>
</head>

<body>
    <style>
        :root {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
            background: #eef2ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 35%),
                linear-gradient(180deg, #f8fafc 0%, #e0e7ff 100%);
        }

        center {
            width: 100%;
        }

        h1 {
            margin: 0 0 1.5rem;
            font-size: clamp(2rem, 3vw, 3rem);
            color: #0acaf0;
            letter-spacing: 0.02em;
            text-align: center;
        }
    </style>
     <center>
        <h1>Welcome to Exam App </h1>
        <nav>
            <a href="index.html"><button class="logout-link">Logout</button></a>
        </nav>
        <hr>
    </center>

    <form id="examform">
        <label>Q.1 HTML is the Case Senstive language</label>
        <br><br>
        <input type="radio" id="Q1true" name="Q1" value="true">
        <label for="Q1true">True</label>
        <input type="radio" name="Q1" id="Q1false" value="false">
        <label for="Q1false">False</label>

        <br>
        <br>

        <label>Q.2 Javascript is the Object based language</label>
        <br><br>
        <input type="radio" id="Q2true" name="Q2" value="true">
        <label for="Q2true">True</label>
        <input type="radio" name="Q2" id="Q1false" value="false">
        <label for="Q2false">False</label>

        <br><br>

        <input type="submit" value="submit">
        <input type="reset" value="cancel">

        <h1 id="result"></h1>
    </form>
    <script>
        document.getElementById("examform").addEventListener("submit", function (event) {
            event.preventDefault();
            let score = 0;
            let Q1_ans = document.getElementById("Q1false").checked;
            let Q2_ans = document.getElementById("Q2true").checked;

            if (Q1_ans) {
                score = score + 1;

            }
            if (Q2_ans) {
                score = score + 1;
            }

            if (!document.querySelector("input[name='Q1']:checked")) {
                alert("please select the option...")


            }

            if (!document.querySelector("input[name='Q2']:checked")) {
                alert("please select the option...")
            }

            document.getElementById("result").innerHTML = "Your score:" + score


        })
    </script>


</body>

</html>
