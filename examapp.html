<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamApp</title>
</head>

<body>
    <style>
        :root {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
            background: #eef2ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 35%),
                linear-gradient(180deg, #f8fafc 0%, #e0e7ff 100%);
        }

        center {
            width: 100%;
        }

        h1 {
            margin: 0 0 1.5rem;
            font-size: clamp(2rem, 3vw, 3rem);
            color: #0acaf0;
            letter-spacing: 0.02em;
            text-align: center;
        }
    </style>
    <h1>Welcome to Exam App </h1>

</body>

</html>
