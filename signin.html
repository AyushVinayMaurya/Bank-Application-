<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank |Singin</title>
    <style>
        :root {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
            background: #eef2ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 35%),
                linear-gradient(180deg, #f8fafc 0%, #e2e8ff 100%);
        }

        center {
            width: 100%;
        }

        h1 {
            margin: 0 0 1.25rem;
            font-size: clamp(2rem, 3vw, 2.5rem);
            color: #4338ca;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: #4f46e5;
            font-weight: 700;
            padding: 0.65rem 1rem;
            border-radius: 999px;
            background: rgba(99, 102, 241, 0.1);
            transition: background-color 0.18s ease, transform 0.18s ease;
        }

        nav a:hover {
            background: rgba(99, 102, 241, 0.2);
            transform: translateY(-1px);
        }

        form {
            width: min(440px, 100%);
            padding: 2rem;
            border-radius: 28px;
            background: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        }

        input[type='text'],
        input[type='password'] {
            width: 100%;
            padding: 0.95rem 1rem;
            margin-bottom: 1rem;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 1rem;
            color: #0f172a;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        input[type='text']:focus,
        input[type='password']:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        input[type='submit'],
        input[type='reset'],
        input[type='button'] {
            width: calc(33.333% - 0.66rem);
            margin: 0.33rem;
            padding: 0.95rem 0.85rem;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }

        input[type='submit'] {
            background: #4338ca;
            color: white;
        }

        input[type='reset'] {
            background: #e0e7ff;
            color: #1f2937;
        }

        input[type='button'] {
            background: #f8fafc;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        input[type='submit']:hover,
        input[type='reset']:hover,
        input[type='button']:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 22px rgba(79, 70, 229, 0.12);
        }

        @media (max-width: 560px) {

            input[type='submit'],
            input[type='reset'],
            input[type='button'] {
                width: 100%;
                margin: 0.35rem 0;
            }
        }
    </style>
</head>

<body>
    <center>
        <h1>Singnin Here </h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="singup.html">Sign-in</a>
        </nav>
        <form id="signinform">

            <input type="text" id="email" placeholder="Enter email" required>
            <br>
            <br>
            <input type="text" id="password" placeholder="Enter password" required>
            <br>

            <br>
            <input type="submit" value="Submit">
            <input type="reset" value="Clear">
            <a href="index.html"><input type="button" value="Cancel"></a>

        </form>
    </center>
    <script>
        document.getElementById("signinform").addEventListener("submit", function (event) {
            event.preventDefault();
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            console.log(email, password);

            // let storedEmail = localStorage.getItem("email");
            // let storedPassword = localStorage.getItem("password");
            // console.log(email, password);

            let userlist = JSON.parse(localStorage.getItem("userlist")) || [];

            let user = userlist.find(i => i.email === email && i.password === password);

            if (user) // (email === storedEmail && password ===     storedPassword)
            {
                localStorage.setItem('currentuser', JSON.stringify(user));
                alert("Login SuccesfullY");
                window.location.href = "bank.html";
            }
            else {
                alert("login failed....Please Try again later")
            }

        });
    </script>
</body>

</html>
